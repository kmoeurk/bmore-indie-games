name: Crawl Indie Games

on:
  # Run every day at 2:00 AM UTC
  schedule:
    - cron: "0 2 * * *"
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  crawl:
    name: Crawl itch.io & Update Games Data
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write   # required to push the updated JSON back

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── 2. Python ────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: crawler/requirements.txt

      # ── 3. Python deps ───────────────────────────────────────
      - name: Install Python dependencies
        run: pip install -r crawler/requirements.txt

      # ── 4. Playwright browsers ───────────────────────────────
      # crawl4ai uses Playwright under the hood.
      # --with-deps installs OS-level libs needed on Ubuntu.
      - name: Install Playwright Chromium
        run: playwright install --with-deps chromium

      # ── 5. Crawl ─────────────────────────────────────────────
      - name: Run itch.io crawler
        run: python crawler/crawler.py

      # ── 6. Commit updated JSON ───────────────────────────────
      - name: Commit updated games data
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/games.json

          # Only commit if the file actually changed
          if git diff --staged --quiet; then
            echo "No changes to games.json — skipping commit"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            GAME_COUNT=$(python - <<'EOF'
import json, pathlib
games = json.loads(pathlib.Path("data/games.json").read_text())
print(len(games))
EOF
)
            git commit -m "chore: update games data — ${GAME_COUNT} games [skip ci]"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Committed and pushed ${GAME_COUNT} games"
          fi

      # ── 7. Redeploy to Vercel ─────────────────────────────────
      # Triggers a fresh Vercel production deployment so the live
      # site picks up the new games.json immediately.
      - name: Redeploy to Vercel
        if: steps.commit.outputs.changed == 'true'
        env:
          VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm install -g vercel@latest --silent
          vercel pull --yes \
            --token="$VERCEL_TOKEN" \
            --environment=production
          vercel build --prod \
            --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod \
            --token="$VERCEL_TOKEN"
