name: Crawl Indie Games

on:
  schedule:
    - cron: "0 2 * * *"   # 2:00 AM UTC daily
  workflow_dispatch:

jobs:
  crawl:
    name: Crawl itch.io & Upsert to Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    env:
      SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      IGDB_CLIENT_ID:       ${{ secrets.IGDB_CLIENT_ID }}
      IGDB_CLIENT_SECRET:   ${{ secrets.IGDB_CLIENT_SECRET }}
      IGDB_ACCESS_TOKEN:    ${{ secrets.IGDB_ACCESS_TOKEN }}
      EVENTBRITE_API_KEY:   ${{ secrets.EVENTBRITE_API_KEY }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── 2. Python ────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: crawler/requirements.txt

      # ── 3. Python deps ───────────────────────────────────────
      - name: Install Python dependencies
        run: pip install -r crawler/requirements.txt

      # ── 4. Playwright browsers ───────────────────────────────
      - name: Install Playwright Chromium
        run: playwright install --with-deps chromium

      # ── 5. Crawl ─────────────────────────────────────────────
      - name: Run itch.io crawler
        run: python crawler/crawler.py

      # ── 6. Commit JSON fallback if changed ───────────────────
      # Only runs if Supabase was unavailable and JSON was updated instead
      - name: Commit updated games data (fallback only)
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/games.json

          if git diff --staged --quiet; then
            echo "No changes to games.json — Supabase was used or no new games"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            GAME_COUNT=$(python - <<'EOF'
import json, pathlib
games = json.loads(pathlib.Path("data/games.json").read_text())
print(len(games))
EOF
)
            git commit -m "chore: update games fallback JSON — ${GAME_COUNT} games [skip ci]"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Committed and pushed ${GAME_COUNT} games"
          fi

      # ── 7. Redeploy to Vercel ─────────────────────────────────
      - name: Redeploy to Vercel
        if: steps.commit.outputs.changed == 'true'
        env:
          VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm install -g vercel@latest --silent
          vercel pull --yes \
            --token="$VERCEL_TOKEN" \
            --environment=production
          vercel build --prod \
            --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod \
            --token="$VERCEL_TOKEN"
